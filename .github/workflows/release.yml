name: Release

on:
  push:
    branches: [main]
    paths:
      - "bin/**"
      - "cli/**"

permissions:
  contents: write

jobs:
  publish:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint:assets

      - run: pnpm test

      - run: npm pack --dry-run

      - name: Prepare release
        id: release
        run: |
          changed_files="$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | tr '\n' ' ')"
          version="$(node scripts/prepare-release.mjs $changed_files)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Commit release files
        if: ${{ steps.release.outputs.version != 'No CLI changes detected.' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore(release): v${{ steps.release.outputs.version }}"
          git tag -a "v${{ steps.release.outputs.version }}" -m "v${{ steps.release.outputs.version }}"

      - name: Publish npm package
        if: ${{ steps.release.outputs.version != 'No CLI changes detected.' }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push release commit and tag
        if: ${{ steps.release.outputs.version != 'No CLI changes detected.' }}
        run: |
          git push origin HEAD:main
          git push origin "v${{ steps.release.outputs.version }}"
