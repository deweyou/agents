<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Buttons · variants</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  body { padding: 22px 28px; background: var(--ui-color-canvas); }
  .eyebrow { font-family: system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ui-color-text-muted); margin-bottom: 16px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 10px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 0.34rem 0.72rem; font: 600 0.875rem / 1.25 var(--ui-font-body);
    border: 1px solid transparent; border-radius: var(--ui-radius-float);
    cursor: pointer; transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
  }
  .filled { background: var(--ui-color-text); color: var(--ui-color-canvas); border-color: var(--ui-color-text); }
  .filled.primary { background: var(--ui-color-brand-bg); color: var(--ui-color-text-on-brand); border-color: var(--ui-color-brand-bg); }
  .filled.danger { background: var(--ui-color-danger-bg); color: var(--ui-color-text-on-danger); border-color: var(--ui-color-danger-bg); }
  .outlined { background: transparent; color: var(--ui-color-text); border-color: var(--ui-color-border-strong); }
  .ghost { background: transparent; color: var(--ui-color-text); border-color: transparent; font-weight: 500; }
  .link { background: transparent; color: var(--ui-color-text); border: 0; padding: 2px 4px; font-weight: 500; position: relative; }
  .link::after { content: ""; position: absolute; left: 4px; right: 4px; bottom: -2px; height: 1px; background: currentColor; }
  .lbl { font-family: system-ui, sans-serif; font-size: 9px; letter-spacing: 0.08em; color: var(--ui-color-text-muted); width: 60px; text-transform: uppercase; }
</style></head>
<body>
  <div class="eyebrow">Buttons · 4 variants × 3 colors</div>
  <div class="row"><span class="lbl">Filled</span>
    <button class="btn filled">Neutral</button>
    <button class="btn filled primary">Primary</button>
    <button class="btn filled danger">Danger</button>
  </div>
  <div class="row"><span class="lbl">Outlined</span>
    <button class="btn outlined">Neutral</button>
    <button class="btn outlined" style="color: var(--ui-color-brand-bg); border-color: color-mix(in srgb, var(--ui-color-brand-bg) 32%, var(--ui-color-surface));">Primary</button>
    <button class="btn outlined" style="color: var(--ui-color-danger-text); border-color: color-mix(in srgb, var(--ui-color-danger-bg) 30%, var(--ui-color-surface));">Danger</button>
  </div>
  <div class="row"><span class="lbl">Ghost</span>
    <button class="btn ghost">Neutral</button>
    <button class="btn ghost" style="color: var(--ui-color-brand-bg);">Primary</button>
    <button class="btn ghost" style="color: var(--ui-color-danger-text);">Danger</button>
    <span style="width: 20px;"></span>
    <span class="lbl">Link</span>
    <button class="btn link">了解更多</button>
  </div>
</body></html>
