<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  body { padding: 22px 28px; background: var(--ui-color-canvas); }
  .eyebrow { font-family: system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ui-color-text-muted); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background: var(--ui-color-surface); border: 1px solid var(--ui-color-border); border-radius: var(--ui-radius-auto); padding: 16px 18px; }
  .title { font-family: var(--ui-font-display); font-weight: 600; font-size: 1.15rem; margin-bottom: 6px; }
  .body { font-size: 0.9rem; color: var(--ui-color-text-muted); line-height: 1.55; }
  .raised { background: var(--ui-color-surface-raised); box-shadow: var(--ui-shadow-md); border-color: transparent; }
  .rule { width: 32px; height: 2px; background: var(--ui-color-text); margin: 6px 0 10px; }
</style></head>
<body>
  <div class="eyebrow">Card · border by default · shadow optional</div>
  <div class="grid">
    <div class="card">
      <div class="title">组件库</div>
      <div class="rule"></div>
      <div class="body">默认卡片：1px 边框、auto 圆角、无阴影。</div>
    </div>
    <div class="card raised">
      <div class="title">悬浮面板</div>
      <div class="rule"></div>
      <div class="body">Raised 变体：surface-raised 背景 + shadow-md，用于对话框和浮层。</div>
    </div>
  </div>
</body></html>
