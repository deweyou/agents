<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Colors · Red</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  body { padding: 22px 28px; background: var(--ui-color-canvas); }
  .eyebrow { font-family: system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ui-color-text-muted); margin-bottom: 16px; display:flex; justify-content: space-between; }
  .strip { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; margin-bottom: 8px; }
  .sw { height: 38px; border-radius: var(--ui-radius-float); border: 1px solid rgba(0,0,0,0.04); }
  .lbls { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; font-family: var(--ui-font-mono); font-size: 10px; color: var(--ui-color-text-muted); text-align: center; }
</style></head>
<body>
  <div class="eyebrow"><span>Red · danger</span><span>11 steps</span></div>
  <div class="strip">
    <div class="sw" style="background: var(--ui-color-palette-red-50);"></div>
    <div class="sw" style="background: var(--ui-color-palette-red-100);"></div>
    <div class="sw" style="background: var(--ui-color-palette-red-200);"></div>
    <div class="sw" style="background: var(--ui-color-palette-red-300);"></div>
    <div class="sw" style="background: var(--ui-color-palette-red-400);"></div>
    <div class="sw" style="background: var(--ui-color-palette-red-500);"></div>
    <div class="sw" style="background: var(--ui-color-palette-red-600);"></div>
    <div class="sw" style="background: var(--ui-color-palette-red-700);"></div>
    <div class="sw" style="background: var(--ui-color-palette-red-800);"></div>
    <div class="sw" style="background: var(--ui-color-palette-red-900);"></div>
    <div class="sw" style="background: var(--ui-color-palette-red-950);"></div>
  </div>
  <div class="lbls">
    <span>50</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span><span>600</span><span>700</span><span>800</span><span>900</span><span>950</span>
  </div>
</body></html>
