<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
  body { padding: 22px 28px; background: var(--ui-color-canvas); }
  .eyebrow { font-family: system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ui-color-text-muted); margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 8px; }
  .cell { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: var(--ui-color-surface); border: 1px solid var(--ui-color-border); border-radius: var(--ui-radius-float); color: var(--ui-color-text); font-size: 18px; }
  .cell i { stroke-linecap: square; stroke-linejoin: miter; }
  .meta { font-family: var(--ui-font-mono); font-size: 11px; color: var(--ui-color-text-muted); margin-top: 12px; }
</style></head>
<body>
  <div class="eyebrow">Iconography · Tabler Icons · stroke 1.5 · square/miter</div>
  <div class="grid">
    <div class="cell"><i class="ti ti-plus"></i></div>
    <div class="cell"><i class="ti ti-x"></i></div>
    <div class="cell"><i class="ti ti-check"></i></div>
    <div class="cell"><i class="ti ti-search"></i></div>
    <div class="cell"><i class="ti ti-edit"></i></div>
    <div class="cell"><i class="ti ti-trash"></i></div>
    <div class="cell"><i class="ti ti-settings"></i></div>
    <div class="cell"><i class="ti ti-bell"></i></div>
    <div class="cell"><i class="ti ti-home"></i></div>
    <div class="cell"><i class="ti ti-user"></i></div>
    <div class="cell"><i class="ti ti-download"></i></div>
    <div class="cell"><i class="ti ti-upload"></i></div>
    <div class="cell"><i class="ti ti-refresh"></i></div>
    <div class="cell"><i class="ti ti-filter"></i></div>
    <div class="cell"><i class="ti ti-copy"></i></div>
    <div class="cell"><i class="ti ti-eye"></i></div>
    <div class="cell"><i class="ti ti-eye-off"></i></div>
    <div class="cell"><i class="ti ti-arrow-left"></i></div>
    <div class="cell"><i class="ti ti-arrow-right"></i></div>
    <div class="cell"><i class="ti ti-external-link"></i></div>
    <div class="cell"><i class="ti ti-chevron-down"></i></div>
    <div class="cell"><i class="ti ti-chevron-up"></i></div>
    <div class="cell"><i class="ti ti-info-circle"></i></div>
    <div class="cell"><i class="ti ti-alert-triangle"></i></div>
    <div class="cell"><i class="ti ti-menu-2"></i></div>
  </div>
  <div class="meta">全部 30 枚内置图标；可通过 createTablerIcon 扩展。</div>
</body></html>
