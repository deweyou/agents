<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  body { padding: 22px 28px; background: var(--ui-color-canvas); }
  .eyebrow { font-family: system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ui-color-text-muted); margin-bottom: 16px; }
  .col { display: flex; flex-direction: column; gap: 10px; max-width: 320px; }
  .inp { width: 100%; padding: 0.5rem 0.72rem; font: 400 0.9375rem / 1.4 var(--ui-font-body); color: var(--ui-color-text); background: var(--ui-color-surface); border: 1px solid var(--ui-color-border-strong); border-radius: var(--ui-radius-rect); outline: none; }
  .inp::placeholder { color: var(--ui-color-text-muted); }
  .focused { border-color: var(--ui-color-brand-bg); }
  .danger { border-color: var(--ui-color-danger-bg); }
  .caption { font-size: 0.8125rem; color: var(--ui-color-text-muted); }
  .cap-err { color: var(--ui-color-danger-text); }
</style></head>
<body>
  <div class="eyebrow">Input · text field</div>
  <div class="col">
    <input class="inp" placeholder="普通输入框">
    <input class="inp focused" value="聚焦状态 · focus-visible">
    <input class="inp" value="已禁用" disabled style="opacity:0.56; cursor:not-allowed;">
    <div>
      <input class="inp danger" value="dewey.ou@">
      <div class="caption cap-err" style="margin-top:4px;">邮箱格式不正确</div>
    </div>
  </div>
</body></html>
