<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  body { padding: 24px 28px; background: var(--ui-color-canvas); display:flex; flex-direction: column; justify-content: center; min-height: 160px; }
  .eyebrow { font-family: system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ui-color-text-muted); margin-bottom: 18px; text-align: center; }
  .logo-wrap { display: flex; justify-content: center; align-items: center; }
  img { max-width: 420px; width: 100%; height: auto; }

<body>
  <div class="eyebrow">Brand · Dewey Ou wordmark</div>
  <div class="logo-wrap"><img src="../assets/logo.svg" alt="Dewey Ou"></div>
