<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  body { padding: 22px 28px; background: var(--ui-color-canvas); }
  .eyebrow { font-family: system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ui-color-text-muted); margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .cell { display:flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 84px; height: 56px; background: var(--ui-color-text); }
  .name { font-family: var(--ui-font-display); font-weight: 600; font-size: 0.95rem; }
  .meta { font-family: var(--ui-font-mono); font-size: 11px; color: var(--ui-color-text-muted); }
</style></head>
<body>
  <div class="eyebrow">Radii · 4 tiers only</div>
  <div class="grid">
    <div class="cell"><div class="box" style="border-radius: 0;"></div><div class="name">rect</div><div class="meta">0 · inputs</div></div>
    <div class="cell"><div class="box" style="border-radius: 4px;"></div><div class="name">float</div><div class="meta">4px · ghost / tip</div></div>
    <div class="cell"><div class="box" style="border-radius: 8px;"></div><div class="name">auto</div><div class="meta">8px · card / btn</div></div>
    <div class="cell"><div class="box" style="border-radius: 999px;"></div><div class="name">pill</div><div class="meta">999 · badge</div></div>
  </div>
</body></html>
