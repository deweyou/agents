<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Shadow</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  body { padding: 24px 28px 30px; background: var(--ui-color-canvas); }
  .eyebrow { font-family: system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ui-color-text-muted); margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
  .cell { display:flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 100%; height: 66px; background: var(--ui-color-surface-raised); border-radius: var(--ui-radius-auto); border: 1px solid var(--ui-color-border); }
  .name { font-family: var(--ui-font-display); font-weight: 600; font-size: 0.95rem; }
  .meta { font-family: var(--ui-font-mono); font-size: 10px; color: var(--ui-color-text-muted); }
</style></head>
<body>
  <div class="eyebrow">Shadow · warm-tinted, low-drama</div>
  <div class="grid">
    <div class="cell"><div class="box" style="box-shadow: var(--ui-shadow-sm);"></div><div class="name">sm</div><div class="meta">0 2 8 / 6%</div></div>
    <div class="cell"><div class="box" style="box-shadow: var(--ui-shadow-md);"></div><div class="name">md</div><div class="meta">0 8 24 / 10%</div></div>
    <div class="cell"><div class="box" style="box-shadow: var(--ui-shadow-lg);"></div><div class="name">lg · soft</div><div class="meta">0 18 40 / 12%</div></div>
  </div>
</body></html>
