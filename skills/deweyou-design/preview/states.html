<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Interaction states</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  body { padding: 22px 28px; background: var(--ui-color-canvas); }
  .eyebrow { font-family: system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ui-color-text-muted); margin-bottom: 16px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn { padding: 0.34rem 0.72rem; font: 600 0.875rem / 1.25 var(--ui-font-body); border-radius: var(--ui-radius-float); background: var(--ui-color-brand-bg); color: var(--ui-color-text-on-brand); border: 1px solid var(--ui-color-brand-bg); display: inline-flex; align-items: center; gap: 8px; }
  .hover { background: var(--ui-color-brand-bg-hover); border-color: var(--ui-color-brand-bg-hover); }
  .active { background: var(--ui-color-brand-bg-active); transform: translateY(1px); }
  .focus { border-color: var(--ui-color-text-on-brand); background: var(--ui-color-brand-bg-hover); }
  .disabled { opacity: 0.56; cursor: not-allowed; }
  .loading { position: relative; color: transparent; }
  .loading::after {
    content: ""; position: absolute; inset: 0; margin: auto; width: 14px; height: 14px;
    border: 2px solid var(--ui-color-text-on-brand); border-right-color: transparent;
    border-radius: 999px; animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .meta { font-family: var(--ui-font-mono); font-size: 10px; color: var(--ui-color-text-muted); margin-top: 10px; }
</style></head>
<body>
  <div class="eyebrow">States · hover · press · focus · disabled · loading</div>
  <div class="row">
    <button class="btn">Default</button>
    <button class="btn hover">Hover</button>
    <button class="btn active">Press</button>
    <button class="btn focus">Focus</button>
    <button class="btn disabled">Disabled</button>
    <button class="btn loading">Loading</button>
  </div>
  <div class="meta">hover -8% · press -14% + ty(1px) · focus = hover state · disabled 0.56 · loading 0.9s spinner</div>
</body></html>
