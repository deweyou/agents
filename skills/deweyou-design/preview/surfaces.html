<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  body { padding: 22px 28px; background: var(--ui-color-canvas); }
  .eyebrow { font-family: system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ui-color-text-muted); margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .tile { border: 1px solid var(--ui-color-border); border-radius: var(--ui-radius-auto); padding: 18px 16px; }
  .lbl { font-family: var(--ui-font-mono); font-size: 11px; color: var(--ui-color-text-muted); }
  .name { font-family: var(--ui-font-display); font-weight: 600; margin-top: 4px; font-size: 1.05rem; }
</style></head>
<body>
  <div class="eyebrow">Surfaces · warm off-white</div>
  <div class="grid">
    <div class="tile" style="background: var(--ui-color-canvas);">
      <div class="lbl">#fefcf8</div>
      <div class="name">canvas</div>
    </div>
    <div class="tile" style="background: var(--ui-color-surface);">
      <div class="lbl">#fffefb</div>
      <div class="name">surface</div>
    </div>
    <div class="tile" style="background: var(--ui-color-surface-raised); box-shadow: var(--ui-shadow-md);">
      <div class="lbl">#ffffff · shadow-md</div>
      <div class="name">surface-raised</div>
    </div>
  </div>
</body></html>
