<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Tabs</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  body { padding: 22px 28px; background: var(--ui-color-canvas); }
  .eyebrow { font-family: system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ui-color-text-muted); margin-bottom: 16px; }
  .list { display: flex; gap: 0; border-bottom: 1px solid var(--ui-color-border); }
  .tab { padding: 8px 14px; font-family: var(--ui-font-body); font-size: 0.9rem; color: var(--ui-color-text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 500; }
  .tab.on { color: var(--ui-color-text); border-bottom-color: var(--ui-color-text); }
  .panel { padding: 16px 2px; font-size: 0.9rem; color: var(--ui-color-text-muted); line-height: 1.6; }
</style></head>
<body>
  <div class="eyebrow">Tabs · line variant</div>
  <div class="list">
    <div class="tab on">概览</div>
    <div class="tab">组件</div>
    <div class="tab">Design Tokens</div>
    <div class="tab">变更日志</div>
  </div>
  <div class="panel">Line 变体用一条 2px 底边标记激活项，indicator 沿底边滑动。适合导航型切换。</div>
</body></html>
