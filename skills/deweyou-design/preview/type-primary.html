<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Type · Primary</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  body { padding: 24px 28px; background: var(--ui-color-canvas); }
  .eyebrow { font-family: system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ui-color-text-muted); margin-bottom: 14px; }
  .row { display: flex; align-items: baseline; gap: 20px; padding: 10px 0; border-bottom: 1px solid var(--ui-color-border); }
  .row:last-child { border-bottom: none; }
  .lbl { font-family: system-ui, sans-serif; font-size: 9px; letter-spacing: 0.08em; color: var(--ui-color-text-muted); min-width: 52px; text-transform: uppercase; }
  .h1-s { font-size: 2.8rem; line-height: 1.02; font-weight: 700; font-family: var(--ui-font-display); }
  .h3-s { font-size: 1.5rem; line-height: 1.14; font-weight: 600; font-family: var(--ui-font-display); }
</style></head>
<body>
  <div class="eyebrow">Type · Source Han Serif CN · Song</div>
  <div class="row"><span class="lbl">H1</span><span class="h1-s">Design 设计</span></div>
  <div class="row"><span class="lbl">H3</span><span class="h3-s">简约 · 线条感 · 中文优先</span></div>
  <div class="row"><span class="lbl">Body</span><span style="font-size:1rem; line-height:1.6;">基于宋体字形节奏与温暖色系构建，覆盖完整 UI 场景。</span></div>
</body></html>
