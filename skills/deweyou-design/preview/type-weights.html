<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Type 쨌 Weights</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  body { padding: 22px 28px; background: var(--ui-color-canvas); }
  .eyebrow { font-family: system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ui-color-text-muted); margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .cell { display:flex; flex-direction: column; gap: 6px; }
  .sample { font-family: var(--ui-font-display); font-size: 2.1rem; line-height: 1; color: var(--ui-color-text); }
  .meta { font-family: var(--ui-font-mono); font-size: 11px; color: var(--ui-color-text-muted); letter-spacing: 0.04em; }
</style></head>
<body>
  <div class="eyebrow">Weights 쨌 4 steps</div>
  <div class="grid">
    <div class="cell"><div class="sample" style="font-weight:400;">Aa 麗멩걩</div><div class="meta">400 쨌 regular 쨌 body</div></div>
    <div class="cell"><div class="sample" style="font-weight:500;">Aa 麗멩걩</div><div class="meta">500 쨌 medium 쨌 emphasis</div></div>
    <div class="cell"><div class="sample" style="font-weight:600;">Aa 麗멩걩</div><div class="meta">600 쨌 semibold 쨌 title</div></div>
    <div class="cell"><div class="sample" style="font-weight:700;">Aa 麗멩걩</div><div class="meta">700 쨌 bold 쨌 h1/h5</div></div>
  </div>
</body></html>
