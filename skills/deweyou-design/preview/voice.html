<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Voice</title>
<link rel="stylesheet" href="../colors_and_type.css?v=3">
<style>
  body { padding: 22px 28px; background: var(--ui-color-canvas); }
  .eyebrow { font-family: system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ui-color-text-muted); margin-bottom: 16px; }
  .quote { font-family: var(--ui-font-display); font-size: 1.3rem; line-height: 1.45; color: var(--ui-color-text); margin-bottom: 14px; }
  .rule { width: 36px; height: 2px; background: var(--ui-color-text); margin: 10px 0 14px; }
  .row { display: flex; gap: 20px; font-size: 0.875rem; color: var(--ui-color-text-muted); }
  .col { flex: 1; }
  .col b { color: var(--ui-color-text); font-weight: 500; display:block; margin-bottom: 2px; }
  .col p { margin: 0 0 4px; font-size: 0.85rem; }
</style></head>
<body>
  <div class="eyebrow">Voice · matter-of-fact · no emoji</div>
  <div class="quote">基于宋体字形节奏与温暖色系构建，27 个组件覆盖完整 UI 场景。</div>
  <div class="rule"></div>
  <div class="row">
    <div class="col"><b>Do</b>
      <p>打开 Popover</p>
      <p>已勾选</p>
      <p>查看全部图标 →</p>
    </div>
    <div class="col"><b>Don't</b>
      <p>🚀 Let's go!</p>
      <p>您 已 成功 保存</p>
      <p>Awesome tool, try it!</p>
    </div>
  </div>
</body></html>
