<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deweyou Design — UI Kit v2</title>
  <link rel="stylesheet" href="../../colors_and_type.css?v=2">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
  <style>
    html, body { margin: 0; padding: 0; background: var(--ui-color-canvas); }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="V2.jsx"></script>
  <script type="text/babel">
    /* Each artboard wraps V2 in a div with data-theme so tokens resolve per-artboard. */
    const ThemedV2 = ({ theme }) => (
      <div data-theme={theme} style={{ background: 'var(--ui-color-canvas)', minHeight: '100%' }}>
        <V2 />
      </div>
    );

    const App = () => (
      <DesignCanvas>
        <DCSection id="website" title="Website — V2 Ledger · Light + Dark">
          <DCArtboard id="v2-light" label="V2 · Light — cool gray-green #f2f3f1" width={1240} height={1800}>
            <ThemedV2 theme="light" />
          </DCArtboard>
          <DCArtboard id="v2-dark" label="V2 · Dark — warm near-black #14120f" width={1240} height={1800}>
            <ThemedV2 theme="dark" />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
